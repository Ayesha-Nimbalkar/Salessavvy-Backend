spring.application.name=salessavvy

# Railway dynamic port
server.port=${PORT:8080}

# ===============================
# DATABASE (MySQL Railway)
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT
# ===============================
jwt.secret=test123
jwt.expiration=3600000

# ===============================
# Cashfree
# ===============================
cashfree.client.id=test
cashfree.client.secret=test
cashfree.env=sandbox
